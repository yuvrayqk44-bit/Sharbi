<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Bot System - Credits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #00fff2;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 0, 0, 0.05);
            border: 2px solid rgba(255, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .main-title {
            font-size: 2.2em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0000, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .sub-title {
            font-size: 0.8em;
            color: #ff6b00;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .credit-wallet {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 20px;
            color: #ffd700;
            font-weight: 700;
            font-size: 0.9em;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-login {
            background: linear-gradient(45deg, #00fff2, #b300ff);
            color: #000;
        }
        .btn-logout {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0040;
            color: #ff0040;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .menu-card {
            background: rgba(255, 0, 0, 0.03);
            border: 1px solid rgba(255, 0, 0, 0.15);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            border-color: #ff0000;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.2);
        }
        .menu-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .menu-card.locked:hover {
            transform: none;
            box-shadow: none;
        }
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: block;
        }
        .menu-card h3 {
            color: #ff6b00;
            font-size: 1em;
            margin-bottom: 8px;
        }
        .menu-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
        }
        .lock-icon {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #ff0040;
            font-size: 1.2em;
        }
        .feature-area {
            background: rgba(255, 0, 0, 0.03);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideUp 0.5s ease;
        }
        .feature-area.active {
            display: block;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .feature-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.1);
        }
        .feature-header h2 {
            color: #ff6b00;
            font-size: 1.5em;
        }
        .close-btn {
            background: none;
            border: none;
            color: #ff0040;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-btn:hover {
            transform: rotate(90deg);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #ff6b00;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff0000, #ff6b00);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 30px rgba(255, 0, 0, 0.3);
        }
        .btn-submit.gold {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #000;
        }
        .btn-submit.blue {
            background: linear-gradient(45deg, #00fff2, #b300ff);
            color: #000;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border-left: 4px solid #ff6b00;
            color: #fff;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-box.success {
            border-left-color: #00ff00;
            display: block;
        }
        .result-box.error {
            border-left-color: #ff0040;
            display: block;
        }
        .result-box.loading {
            border-left-color: #ffff00;
            display: block;
        }
        .result-box.info {
            border-left-color: #00fff2;
            display: block;
        }
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .auth-modal.active {
            display: flex;
        }
        .auth-box {
            background: #1a1a2e;
            border: 2px solid #ff6b00;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .auth-box h2 {
            color: #ff6b00;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .auth-box .close-auth {
            float: right;
            font-size: 1.5em;
            color: #ff0040;
            cursor: pointer;
            background: none;
            border: none;
        }
        .auth-box .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.3);
        }
        .auth-box .divider::before,
        .auth-box .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .auth-switch {
            text-align: center;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
        }
        .auth-switch a {
            color: #ff6b00;
            cursor: pointer;
            text-decoration: underline;
        }
        .owner-panel-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: 2px solid #ffd700;
            color: #000;
            padding: 16px 20px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999;
            font-size: 1.5em;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            font-weight: 900;
        }
        .owner-panel-toggle:hover {
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.6);
        }
        .owner-panel-toggle:active {
            transform: scale(0.9);
        }
        .owner-panel {
            position: fixed;
            bottom: 90px;
            right: 25px;
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 30px;
            max-width: 420px;
            width: 92%;
            z-index: 9998;
            display: none;
            animation: slideUp 0.4s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            max-height: 85vh;
            overflow-y: auto;
        }
        .owner-panel.active {
            display: block;
        }
        .owner-panel h4 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 15px;
        }
        .owner-panel input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
        }
        .owner-panel input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        .owner-panel .btn-submit {
            font-size: 0.95em;
            padding: 14px;
            border-radius: 10px;
        }
        .owner-panel .btn-submit.gold {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            color: #000;
        }
        .owner-panel .btn-submit.gold:hover {
            box-shadow: 0 5px 30px rgba(255, 215, 0, 0.3);
        }
        .owner-panel .btn-submit.blue {
            background: linear-gradient(45deg, #00fff2, #b300ff);
            color: #000;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 99999;
            animation: slideIn 0.5s ease;
            display: none;
            max-width: 400px;
        }
        .toast.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            display: block;
        }
        .toast.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0040;
            display: block;
        }
        .toast.info {
            background: rgba(0, 255, 242, 0.2);
            border: 1px solid #00fff2;
            display: block;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8em;
            border-top: 1px solid rgba(255, 0, 0, 0.1);
            margin-top: 30px;
        }
        .footer-links a {
            color: #ff6b00;
            text-decoration: none;
            margin: 0 15px;
            cursor: pointer;
        }
        .footer-links a:hover {
            color: #ff0000;
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            .main-title { font-size: 1.8em; }
            .user-section { justify-content: center; margin-top: 10px; }
            .menu-grid { grid-template-columns: 1fr 1fr; }
            .owner-panel {
                right: 10px;
                max-width: 95%;
                bottom: 80px;
                padding: 20px;
            }
            .owner-panel-toggle {
                bottom: 15px;
                right: 15px;
                padding: 14px 18px;
                font-size: 1.3em;
            }
        }
        @media (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr; }
            .feature-area { padding: 15px; }
            .auth-box { padding: 25px; }
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div id="particles-js"></div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="auth-modal">
        <div class="auth-box">
            <button class="close-auth" onclick="closeAuth()">✕</button>
            <h2 id="authTitle">🔑 LOGIN</h2>
            <div id="authForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="Enter password">
                </div>
                <button class="btn-submit" onclick="handleAuth()" id="authBtn">LOGIN</button>
                
                <div class="divider">OR</div>
                
                <button class="btn-submit" style="background:#fff;color:#000;display:flex;align-items:center;justify-content:center;gap:10px;" onclick="googleLogin()">
                    <span style="font-size:1.2em;">G</span> Continue with Google
                </button>
                
                <div class="auth-switch">
                    <span id="authSwitchText">Don't have an account?</span>
                    <a onclick="switchAuth()" id="authSwitchLink">Register</a>
                </div>
            </div>
        </div>
    </div>

    <!-- OWNER PANEL -->
    <button class="owner-panel-toggle" id="ownerToggleBtn" onclick="toggleOwnerPanel()">👑</button>
    
    <div class="owner-panel" id="ownerPanel">
        <h4>👑 OWNER CREDIT SYSTEM</h4>
        <input type="password" id="ownerPass" placeholder="Enter owner password">
        <button class="btn-submit gold" onclick="loginOwner()">🔓 UNLOCK</button>
        <div id="ownerContent" style="display:none;margin-top:15px;">
            <hr style="border-color:rgba(255,215,0,0.2);margin-bottom:15px;">
            <div class="form-group" style="margin-bottom:10px;">
                <label style="color:#ffd700;font-size:0.8em;">👤 User Email</label>
                <input type="email" id="ownerUserEmail" placeholder="Enter user email">
            </div>
            <div class="form-group" style="margin-bottom:10px;">
                <label style="color:#ffd700;font-size:0.8em;">🪙 Credits to Add</label>
                <input type="number" id="ownerCreditAmount" placeholder="Enter amount" min="1">
            </div>
            <div class="form-group" style="margin-bottom:10px;">
                <label style="color:#ffd700;font-size:0.8em;">📝 Reason (Optional)</label>
                <input type="text" id="ownerReason" placeholder="Why giving credits?">
            </div>
            <button class="btn-submit gold" onclick="giveCredits()">💸 GIVE CREDITS</button>
            <div id="ownerResult" style="margin-top:10px;color:#00ff00;font-size:0.9em;"></div>
            
            <hr style="border-color:rgba(255,215,0,0.2);margin:15px 0;">
            <button class="btn-submit blue" onclick="viewAllUsers()">📊 VIEW ALL USERS</button>
            <div id="userList" style="margin-top:10px;max-height:200px;overflow-y:auto;color:rgba(255,255,255,0.8);font-size:0.85em;"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <div>
                <h1 class="main-title">🔥 FREE FIRE</h1>
                <p class="sub-title">Multi-Bot Emote System</p>
                <div style="display:inline-block;padding:5px 15px;background:rgba(255,215,0,0.1);border:1px solid #ffd700;border-radius:20px;color:#ffd700;font-size:0.8em;margin-top:5px;">👑 Made by YUVRAJ</div>
            </div>
            <div class="user-section">
                <div class="credit-wallet" id="walletDisplay">🪙 0 Credits</div>
                <button class="btn btn-login" onclick="openAuth('login')" id="authBtnMain">🔑 Login</button>
            </div>
        </header>

        <div class="menu-grid">
            <div class="menu-card locked" onclick="checkAccess('join')" id="card-join">
                <span class="lock-icon">🔒</span>
                <span class="card-icon">👥</span>
                <h3>JOIN SQUAD & EMOTE</h3>
                <p>Requires 1 Credit</p>
            </div>
            <div class="menu-card locked" onclick="checkAccess('bots')" id="card-bots">
                <span class="lock-icon">🔒</span>
                <span class="card-icon">🤖</span>
                <h3>BOT STATUS</h3>
                <p>Requires 1 Credit</p>
            </div>
            <div class="menu-card locked" onclick="checkAccess('invite')" id="card-invite">
                <span class="lock-icon">🔒</span>
                <span class="card-icon">📨</span>
                <h3>SEND SQUAD INVITE</h3>
                <p>Requires 2 Credits</p>
            </div>
            <div class="menu-card" onclick="showFeature('history')">
                <span class="card-icon">📜</span>
                <h3>CREDIT HISTORY</h3>
                <p>View your transactions</p>
            </div>
            <div class="menu-card" onclick="showFeature('api')">
                <span class="card-
